name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install all workspaces
        run: npm run install:all

      - name: Lint (shared → client → server)
        run: npm run lint

      - name: Type check (shared + client)
        run: npm run type-check

      - name: Format check
        run: npm run format:check

      - name: Test all (shared + client + server)
        run: npm run test:all

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install all workspaces
        run: npm run install:all

      - name: Build frontend (shared + client)
        run: npm run build:frontend
