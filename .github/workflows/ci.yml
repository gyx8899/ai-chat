name: CI

on:
  # push:
  #   branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install root dependencies
        run: npm ci

      - name: Install shared dependencies
        working-directory: ./shared
        run: npm ci

      - name: Install server dependencies
        working-directory: ./server
        run: npm ci

      - name: Install client dependencies
        working-directory: ./client
        run: npm ci

      - name: Lint (shared → client → server)
        run: npm run lint

      - name: Type check (shared + client)
        run: npm run type-check

      - name: Format check
        run: npm run format:check

      - name: Test all (shared + client + server)
        run: npm run test:all

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install root dependencies
        run: npm ci

      - name: Install shared dependencies
        working-directory: ./shared
        run: npm ci

      - name: Install client dependencies
        working-directory: ./client
        run: npm ci

      - name: Build frontend (shared + client)
        run: npm run build:frontend
